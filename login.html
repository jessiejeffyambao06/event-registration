<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Anniversary Guest System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #f5f5f0; --surface: #ffffff; --border: #e0dfd8;
        --accent: #1a1a2e; --accent2: #c8a96e; --text: #1a1a2e;
        --text-muted: #7a7a8a; --error: #c0392b; --radius: 12px;
        --shadow: 0 4px 24px rgba(26,26,46,0.08);
      }
      body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

      .login-header { background: var(--accent); padding: 2.2rem 1.5rem 2rem; text-align: center; position: relative; overflow: hidden; }
      .login-header::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(200,169,110,0.04) 40px, rgba(200,169,110,0.04) 80px); }
      .badge { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent2); border: 1px solid rgba(200,169,110,0.35); padding: 0.3rem 0.85rem; border-radius: 50px; display: inline-block; margin-bottom: 0.85rem; }
      .login-header h1 { font-family: "DM Serif Display", serif; font-size: clamp(1.4rem, 4vw, 2rem); color: #fff; font-weight: 400; }
      .login-header p { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 0.35rem; }

      .login-body { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 2.5rem 1rem 3rem; }
      .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2.5rem 2rem; width: 100%; max-width: 400px; }
      .login-card h2 { font-family: "DM Serif Display", serif; font-size: 1.25rem; margin-bottom: 0.25rem; color: var(--accent); }
      .login-card .sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.8rem; }

      .form-group { margin-bottom: 1.2rem; }
      label { display: block; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.42rem; }
      input { width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: "DM Sans", sans-serif; font-size: 0.92rem; color: var(--text); background: #fafaf8; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
      input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(200,169,110,0.12); background: #fff; }
      input::placeholder { color: #b8b8c4; }

      .btn-login { width: 100%; padding: 0.88rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: "DM Sans", sans-serif; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.15s; margin-top: 0.3rem; }
      .btn-login:hover { background: #2d2d4e; transform: translateY(-1px); }
      .btn-login:active { transform: translateY(0); }
      .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
      .btn-login .spinner { display: none; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
      .btn-login.loading .btn-text { display: none; }
      .btn-login.loading .spinner { display: inline-block; }
      @keyframes spin { to { transform: rotate(360deg); } }

      .login-error { font-size: 0.8rem; color: var(--error); text-align: center; margin-top: 0.85rem; background: rgba(192,57,43,0.06); border: 1px solid rgba(192,57,43,0.15); border-radius: 6px; padding: 0.6rem 0.8rem; display: none; }
      .login-error.show { display: block; }

      .back-link { text-align: center; margin-top: 1.6rem; font-size: 0.8rem; color: var(--text-muted); }
      .back-link a { color: var(--accent2); text-decoration: none; }
      .back-link a:hover { text-decoration: underline; }

      footer { text-align: center; padding: 1.2rem; font-size: 0.75rem; color: var(--text-muted); border-top: 1px solid var(--border); }

      @media (max-width: 480px) {
        .login-header { padding: 1.8rem 1rem 1.5rem; }
        .login-card { padding: 1.8rem 1.2rem; }
      }
    </style>
  </head>
  <body>
    <div class="login-header">
      <div class="badge">Admin Portal</div>
      <h1>Anniversary Guest System</h1>
      <p>Authorized personnel only</p>
    </div>

    <div class="login-body">
      <div class="login-card">
        <h2>Sign In</h2>
        <p class="sub">Enter your admin credentials to access the dashboard.</p>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="admin@yourcompany.com" autocomplete="email"/>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
          <span class="btn-text">Sign In</span>
          <span class="spinner"></span>
        </button>
        <div class="login-error" id="loginError"></div>

        <div class="back-link"><a href="index.html">← Back to Registration</a></div>
      </div>
    </div>

    <footer>&copy; 2026 Ziontech Anniversary</footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script>
      const { createClient } = supabase;
      const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

      // If already logged in, redirect to dashboard
      (async () => {
        const { data: { session } } = await sb.auth.getSession();
        if (session) window.location.href = 'admin.html';
      })();

      async function handleLogin() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errEl    = document.getElementById('loginError');
        const btn      = document.getElementById('loginBtn');

        errEl.classList.remove('show');

        if (!email || !password) {
          errEl.textContent = 'Please enter your email and password.';
          errEl.classList.add('show');
          return;
        }

        btn.classList.add('loading');
        btn.disabled = true;

        const { error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          errEl.textContent = 'Invalid email or password.';
          errEl.classList.add('show');
          btn.classList.remove('loading');
          btn.disabled = false;
        } else {
          window.location.href = 'admin.html';
        }
      }

      document.getElementById('email').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('password').focus();
      });
      document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    </script>
  </body>
</html>
